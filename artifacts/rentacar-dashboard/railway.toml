# Dashboard — deploy a partir da pasta artifacts/rentacar-dashboard
# No Railway: Root Directory = artifacts/rentacar-dashboard
# Variáveis obrigatórias: BASE_PATH=/  (PORT é injetado pelo Railway)

[build]
buildCommand = "cd ../.. && pnpm install && pnpm --filter @workspace/rentacar-dashboard run build"

[deploy]
startCommand = "pnpm run serve"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
