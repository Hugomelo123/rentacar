# API — deploy a partir da pasta artifacts/api-server (monorepo pnpm)
# No Railway: Root Directory = artifacts/api-server

[build]
buildCommand = "cd ../.. && pnpm install && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node dist/index.mjs"
healthcheckPath = "/api/healthz"
restartPolicyType = "ON_FAILURE"
